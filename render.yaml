services:
  - type: web
    name: vehicle-price-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -U pip && pip install .
    startCommand: python -m uvicorn vehicle_price_estimator.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: API_PREFIX
        value: /api/v1
      - key: DATABASE_SSL_MODE
        value: require
      - key: RAW_STORAGE_PATH
        value: /opt/render/project/src/data/raw
      - key: ARTIFACTS_PATH
        value: /opt/render/project/src/data/artifacts
