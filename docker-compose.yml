services:
  postgres:
    image: postgres:16-alpine
    container_name: vehicle-price-postgres
    environment:
      POSTGRES_DB: vehicle_price_estimator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vehicle_price_estimator"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: python:3.11-slim
    container_name: vehicle-price-api
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/vehicle_price_estimator
    command: >
      sh -lc "pip install --no-cache-dir -e . &&
      uvicorn vehicle_price_estimator.api.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data:
